<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 3: El Clasificador Trófico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/efectos.js"></script>

    <style>
        /* =======================================================
           RESET, FONDO Y CONFIGURACIÓN GENERAL
           ======================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%) !important;
            background-color: #1d4ed8 !important;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CAJA CENTRAL DEL JUEGO ESTILO CÓMIC */
        .game-box {
            background: #ffffff !important;
            border: 4px solid #000000 !important;
            border-radius: 28px !important;
            box-shadow: 10px 10px 0px #000000 !important;
            max-width: 500px;
            width: 100%;
            padding: 30px 25px;
            text-align: center;
            position: relative;
        }

        /* Marcadores superiores (HUD) */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #ffffff;
            border: 3px solid #000000;
            padding: 6px 15px;
            border-radius: 14px;
            box-shadow: 3px 3px 0px #000000;
        }

        .hud-text {
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #1d4ed8;
        }

        .score-badge { color: #e11d48; }

        /* Zona del Personaje / Avatar */
        .character-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .avatar-frame {
            width: 75px;
            height: 75px;
            border: 3px solid #000000;
            border-radius: 50%;
            box-shadow: 3px 3px 0px #000000;
            object-fit: cover;
            background: #e2e8f0;
        }

        /* Botón Parlante */
        .btn-repeat-voice {
            background: #fde047 !important;
            color: #000000 !important;
            border: 3px solid #000000;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* Globo de texto de instrucciones */
        .comic-bubble {
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 16px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 4px 4px 0px #1d4ed8;
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.4;
        }

        .word-span { display: inline-block; padding: 0 1px; }
        .word-highlight { background-color: #fde047 !important; color: #000000 !important; border-radius: 4px; }

        /* AREAS DE RECEPTORAS (LAS 3 CAJAS TRÓFICAS) */
        .drop-zones-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .zone-box {
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 16px;
            padding: 10px 4px;
            min-height: 190px;
            box-shadow: 3px 3px 0px #000000;
            transition: background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .zone-box.drag-over {
            background-color: #fef08a; 
        }

        .zone-title {
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            letter-spacing: 0.5px;
            padding: 3px 5px;
            border-radius: 8px;
            color: #ffffff;
            border: 2px solid #000000;
            width: 95%;
            margin-bottom: 4px;
            text-shadow: 1px 1px 0px #000000;
        }
        .bg-prod { background: #16a34a; }
        .bg-cons { background: #dc2626; }
        .bg-desc { background: #2563eb; }

        /* ELEMENTOS PARA ARRASTRAR (TARJETAS) */
        .drag-pool {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 12px;
            border: 3px solid #000000;
            border-radius: 16px;
            min-height: 85px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }

        .drag-item {
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            background: #ffffff;
            border: 2px solid #000000;
            padding: 6px 10px;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 2px 2px 0px #000000;
            user-select: none;
        }

        .drag-item:active { cursor: grabbing; }
        .drag-item.dragging { opacity: 0.3; }

        /* Tarjeta cuando ya está dentro de una caja */
        .zone-box .drag-item {
            width: 95%;
            font-size: 0.8rem;
            padding: 4px;
            box-shadow: none;
            border: 2px solid #000000;
            cursor: default;
        }

        /* =======================================================
           ESTILOS SOLICITADOS PARA LA PANTALLA DE RESULTADOS
           ======================================================= */
        .screen-hidden { 
            display: none !important; 
        }

        /* Título en verde, cursiva inclinada y con sombra idéntico a tu foto */
        .victory-title { 
            font-family: 'Bangers', cursive; 
            font-size: 3.5rem; 
            color: #16a34a; 
            text-shadow: 3px 3px 0px #000000; 
            margin-bottom: 15px;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* El recuadro amarillo para destacar los puntos conseguidos */
        .final-badge { 
            font-family: 'Bangers', cursive; 
            font-size: 1.8rem; 
            background: #fde047; 
            padding: 8px 25px; 
            border: 3px solid #000000; 
            display: inline-block; 
            box-shadow: 4px 4px 0px #000000; 
            margin-bottom: 25px; 
        }

        /* Botones de navegación estilo cómic */
        .btn-nav { 
            font-family: 'Bangers', cursive; 
            font-size: 1.5rem; 
            padding: 12px 25px; 
            border: 3px solid #000000; 
            border-radius: 14px; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            box-shadow: 4px 4px 0px #000000; 
            width: 90%;
            max-width: 380px;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: center;
        }

        .btn-nav:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* Botón 1: Azul con texto blanco y sombra de texto */
        .btn-blue { 
            background: #2563eb; 
            color: #ffffff; 
            text-shadow: 2px 2px 0px #000000; 
        }

        /* Botón 2: Amarillo con texto negro */
        .btn-yellow { 
            background: #fde047; 
            color: #000000; 
        }

        /* Botón 3: Rosado/Fucsia con texto blanco y sombra de texto */
        .btn-pink { 
            background: #e11d48; 
            color: #ffffff; 
            text-shadow: 2px 2px 0px #000000; 
        }
    </style>
</head>
<body>

    <div class="game-box">
        <div id="screen-game">
            <header class="game-header">
                <div class="hud-text">RONDA: <span id="current-round">1/2</span></div>
                <div class="hud-text">PUNTOS: <span id="score-node" class="score-badge">0</span></div>
            </header>

            <div class="character-zone">
                <img id="player-hero-avatar" src="img/avatar1.jpeg" alt="Héroe" class="avatar-frame">
                <button class="btn-repeat-voice" onclick="volverAEscuchar()"><i class="fa-solid fa-volume-high"></i></button>
            </div>

            <div class="comic-bubble" id="instruction-bubble"></div>

            <div class="drop-zones-container">
                <div class="zone-box" data-role="productor" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event)">
                    <div class="zone-title bg-prod">PRODUCTORES</div>
                </div>
                <div class="zone-box" data-role="consumidor" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event)">
                    <div class="zone-title bg-cons">CONSUMIDORES</div>
                </div>
                <div class="zone-box" data-role="descomponedor" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event)">
                    <div class="zone-title bg-desc">DESCOMPONEDORES</div>
                </div>
            </div>

            <p style="font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #475569;">¡Arrastra los elementos a su caja correcta!</p>
            
            <div class="drag-pool" id="items-pool"></div>
        </div>

        <div id="screen-results" class="screen-hidden">
            <h1 class="victory-title">¡MISIÓN CUMPLIDA!</h1>
            <p class="final-badge" id="results-score-text">CONSEGUISTE 0 PUNTOS</p>
            
            <p style="font-weight: bold; font-size: 0.95rem; margin-bottom: 20px; color: #475569;">¿Cuál es tu próximo paso, héroe?</p>
            
            <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                <a href="juego4.html" class="btn-nav btn-blue">➡️ SIGUIENTE NIVEL (JUEGO 4)</a>
                <button class="btn-nav btn-yellow" onclick="reiniciarJuego()">🔄 REPETIR ESTA TRIVIA</button>
                <a href="juegos.html" class="btn-nav btn-pink">🏠 VOLVER AL PANEL</a>
            </div>
        </div>
    </div>

    <script>
        const consignaVozRonda1 = "¡Súper misión de arrastre! Ronda uno. Clasifica este primer grupo de seres vivos chilenos en sus cajas correspondientes.";
        const consignaVozRonda2 = "¡Excelente! Llegamos a la Ronda dos. Aquí tienes nuevos organismos chilenos. ¡A clasificar!";
        
        // Base de datos de 12 organismos chilenos (6 por cada ronda)
        const baseOrganismos = [
            // RONDA 1
            { id: "org1", nombre: "🌲 Alerce", correcto: "productor", ronda: 1 },
            { id: "org2", nombre: "🌾 Pasto", correcto: "productor", ronda: 1 },
            { id: "org3", nombre: "🦌 Huemul", correcto: "consumidor", ronda: 1 },
            { id: "org4", nombre: "🐆 Puma", correcto: "consumidor", ronda: 1 },
            { id: "org5", nombre: "🍄 Hongo", correcto: "descomponedor", ronda: 1 },
            { id: "org6", nombre: "🧫 Bacteria", correcto: "descomponedor", ronda: 1 },
            
            // RONDA 2
            { id: "org7", nombre: "🌺 Copihue", correcto: "productor", ronda: 2 },
            { id: "org8", nombre: "🌵 Cactus", correcto: "productor", ronda: 2 },
            { id: "org9", nombre: "🦉 Lechuza", correcto: "consumidor", ronda: 2 },
            { id: "org10", nombre: "🐭 Monito Monte", correcto: "consumidor", ronda: 2 },
            { id: "org11", nombre: "🪱 Lombriz", correcto: "descomponedor", ronda: 2 },
            { id: "org12", nombre: "🍄 Levadura", correcto: "descomponedor", ronda: 2 }
        ];

        let rondaActual = 1;
        let logradosEnRonda = 0;
        let puntaje = 0;
        let spansPalabras = [];
        let idElementoArrastrándose = null;

        document.addEventListener("DOMContentLoaded", () => {
            const avatar = localStorage.getItem("avatarEstudiante") || "avatar1";
            const imgHero = document.getElementById("player-hero-avatar");
            if(avatar === "avatar1") imgHero.src = "img/avatar1.jpeg";
            else if(avatar === "avatar2") imgHero.src = "img/avatar2.jpeg";
            else if(avatar === "avatar3") imgHero.src = "img/avatar3.jpeg";
            else if(avatar === "avatar4") imgHero.src = "img/avatar4.jpeg";
            
            cargarRonda();
        });

        function cargarRonda() {
            logradosEnRonda = 0;
            document.getElementById("current-round").textContent = `${rondaActual}/2`;
            document.getElementById("score-node").textContent = puntaje;

            const cajaIns = document.getElementById("instruction-bubble");
            const textoVoz = (rondaActual === 1) ? consignaVozRonda1 : consignaVozRonda2;
            
            cajaIns.innerHTML = textoVoz.split(' ').map(w => `<span class="word-span">${w}</span>`).join(' ');
            spansPalabras = cajaIns.querySelectorAll('.word-span');

            const tarjetasRonda = baseOrganismos.filter(item => item.ronda === rondaActual);
            const listaMezclada = tarjetasRonda.sort(() => Math.random() - 0.5);

            const pool = document.getElementById("items-pool");
            pool.innerHTML = listaMezclada.map(org => `
                <div class="drag-item" id="${org.id}" draggable="true" ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">
                    ${org.nombre}
                </div>
            `).join('');

            reproducirConSubrayado(textoVoz);
        }

        function reproducirConSubrayado(textoAEscuchar) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            const ut = new SpeechSynthesisUtterance(textoAEscuchar);
            ut.lang = 'es-CL';
            ut.rate = 0.85;
            let idxW = 0;

            ut.onboundary = (e) => {
                if (e.name === 'word') {
                    spansPalabras.forEach(s => s.classList.remove('word-highlight'));
                    if (idxW < spansPalabras.length) {
                        spansPalabras[idxW].classList.add('word-highlight');
                        idxW++;
                    }
                }
            };
            ut.onend = () => spansPalabras.forEach(s => s.classList.remove('word-highlight'));
            window.speechSynthesis.speak(ut);
        }

        function volverAEscuchar() { 
            const textoVoz = (rondaActual === 1) ? consignaVozRonda1 : consignaVozRonda2;
            reproducirConSubrayado(textoVoz); 
        }

        function handleDragStart(e) {
            idElementoArrastrándose = e.target.id;
            e.target.classList.add("dragging");
            e.dataTransfer.setData("text/plain", e.target.id);
        }

        function handleDragEnd(e) {
            e.target.classList.remove("dragging");
        }

        function allowDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.add("drag-over");
        }

        function dragLeave(e) {
            e.currentTarget.classList.remove("drag-over");
        }

        function handleDrop(e) {
            e.preventDefault();
            const contenedorDestino = e.currentTarget;
            contenedorDestino.classList.remove("drag-over");

            const idTarjeta = idElementoArrastrándose || e.dataTransfer.getData("text");
            const tarjetaElemento = document.getElementById(idTarjeta);
            if (!tarjetaElemento) return;

            const datosObjeto = baseOrganismos.find(item => item.id === idTarjeta);
            const rolCajaDestino = contenedorDestino.getAttribute("data-role");

            if (datosObjeto.correcto === rolCajaDestino) {
                tarjetaElemento.setAttribute("draggable", "false");
                contenedorDestino.appendChild(tarjetaElemento); 
                
                puntaje += 100;
                logradosEnRonda++;
                
                document.getElementById("score-node").textContent = puntaje;
                reproducirAcierto(); // Sonido nativo de acierto
                reproducirAudioCorto("¡Excelente!");

                if (logradosEnRonda === 6) {
                    if (rondaActual === 1) {
                        setTimeout(() => {
                            rondaActual = 2;
                            limpiarCajasVisuales();
                            cargarRonda();
                        }, 1200);
                    } else {
                        setTimeout(finalizarJuego, 1200);
                    }
                }
            } else {
                reproducirError(); // Sonido nativo de error
                reproducirAudioCorto("¡Prueba otra caja!");
                puntaje = Math.max(0, puntaje - 20); 
                document.getElementById("score-node").textContent = puntaje;
            }
            idElementoArrastrándose = null;
        }

        function reproducirAudioCorto(mensaje) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const discurso = new SpeechSynthesisUtterance(mensaje);
                discurso.lang = 'es-CL';
                window.speechSynthesis.speak(discurso);
            }
        }

        function limpiarCajasVisuales() {
            const cajas = document.querySelectorAll(".zone-box");
            cajas.forEach(caja => {
                const tarjetas = caja.querySelectorAll(".drag-item");
                tarjetas.forEach(t => t.remove());
            });
        }

        // Lógica clave: Hace el intercambio de pantallas e inyecta los puntos en la tarjeta amarilla
        function finalizarJuego() {
            // Guardar puntaje en localStorage
            localStorage.setItem("puntaje_juego3", puntaje);

            document.getElementById("screen-game").classList.add("screen-hidden");
            document.getElementById("screen-results").classList.remove("screen-hidden");
            document.getElementById("results-score-text").textContent = `CONSEGUISTE ${puntaje} PUNTOS`;
            
            lanzarSerpentinas(); // Serpentinas visuales y sonido de confetti
            reproducirAudioCorto(`¡Misión cumplida! Conseguiste ${puntaje} puntos.`);
        }

        function reiniciarJuego() {
            rondaActual = 1;
            puntaje = 0;
            limpiarCajasVisuales();
            document.getElementById("screen-results").classList.add("screen-hidden");
            document.getElementById("screen-game").classList.remove("screen-hidden");
            cargarRonda();
        }
    </script>
</body>
</html>
