<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 4: El Intruso del Ecosistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/efectos.js"></script>

    <style>
        /* =======================================================
           RESET, FONDO Y CONFIGURACIÓN GENERAL
           ======================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%) !important;
            background-color: #1d4ed8 !important;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CAJA CENTRAL DEL JUEGO ESTILO CÓMIC */
        .game-box {
            background: #ffffff !important;
            border: 4px solid #000000 !important;
            border-radius: 28px !important;
            box-shadow: 10px 10px 0px #000000 !important;
            max-width: 500px;
            width: 100%;
            padding: 30px 25px;
            text-align: center;
            position: relative;
        }

        /* Marcadores superiores (HUD) */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #ffffff;
            border: 3px solid #000000;
            padding: 6px 15px;
            border-radius: 14px;
            box-shadow: 3px 3px 0px #000000;
        }

        .hud-text {
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #1d4ed8;
        }

        .score-badge { color: #e11d48; }

        /* Zona del Personaje / Avatar */
        .character-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .avatar-frame {
            width: 75px;
            height: 75px;
            border: 3px solid #000000;
            border-radius: 50%;
            box-shadow: 3px 3px 0px #000000;
            object-fit: cover;
            background: #e2e8f0;
        }

        /* Botón Parlante */
        .btn-repeat-voice {
            background: #fde047 !important;
            color: #000000 !important;
            border: 3px solid #000000;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* Globo de texto de instrucciones */
        .comic-bubble {
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 16px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 4px 4px 0px #1d4ed8;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.4;
        }

        .word-span { display: inline-block; padding: 0 1px; }
        .word-highlight { background-color: #fde047 !important; color: #000000 !important; border-radius: 4px; }

        /* CONTENEDOR DE OPCIONES (BOTONES DE RESPUESTA A, B, C) */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
            align-items: center;
        }

        .btn-option {
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
            font-size: 1.05rem;
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            width: 100%;
            text-align: left;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-option:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* =======================================================
           ESTILOS PARA LA PANTALLA DE RESULTADOS
           ======================================================= */
        .screen-hidden { 
            display: none !important; 
        }

        .victory-title { 
            font-family: 'Bangers', cursive; 
            font-size: 3.5rem; 
            color: #16a34a; 
            text-shadow: 3px 3px 0px #000000; 
            margin-bottom: 15px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .final-badge { 
            font-family: 'Bangers', cursive; 
            font-size: 1.8rem; 
            background: #fde047; 
            padding: 8px 25px; 
            border: 3px solid #000000; 
            display: inline-block; 
            box-shadow: 4px 4px 0px #000000; 
            margin-bottom: 25px; 
        }

        /* Botones de navegación de la pantalla final */
        .btn-nav { 
            font-family: 'Bangers', cursive; 
            font-size: 1.5rem; 
            padding: 12px 25px; 
            border: 3px solid #000000; 
            border-radius: 14px; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            box-shadow: 4px 4px 0px #000000; 
            width: 90%;
            max-width: 380px;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: center;
        }

        .btn-nav:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        .btn-blue { 
            background: #2563eb; 
            color: #ffffff; 
            text-shadow: 2px 2px 0px #000000; 
        }

        .btn-yellow { 
            background: #fde047; 
            color: #000000; 
        }

        .btn-pink { 
            background: #e11d48; 
            color: #ffffff; 
            text-shadow: 2px 2px 0px #000000; 
        }
    </style>
</head>
<body>

    <div class="game-box">
        <div id="screen-game">
            <header class="game-header">
                <div class="hud-text">PREGUNTA: <span id="current-question">1/5</span></div>
                <div class="hud-text">PUNTOS: <span id="score-node" class="score-badge">0</span></div>
            </header>

            <div class="character-zone">
                <img id="player-hero-avatar" src="img/avatar1.jpeg" alt="Héroe" class="avatar-frame">
                <button class="btn-repeat-voice" onclick="volverAEscuchar()"><i class="fa-solid fa-volume-high"></i></button>
            </div>

            <div class="comic-bubble" id="instruction-bubble"></div>

            <div class="options-container" id="options-pool">
                </div>
        </div>

        <div id="screen-results" class="screen-hidden">
            <h1 class="victory-title">¡MISIÓN CUMPLIDA!</h1>
            <p class="final-badge" id="results-score-text">CONSEGUISTE 0 PUNTOS</p>
            
            <p style="font-weight: bold; font-size: 0.95rem; margin-bottom: 20px; color: #475569;">¿Cuál es tu próximo paso, héroe?</p>
            
            <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                <a href="juego5.html" class="btn-nav btn-blue">➡️ SIGUIENTE NIVEL (JUEGO 5)</a>
                <button class="btn-nav btn-yellow" onclick="reiniciarJuego()">🔄 REPETIR ESTA TRIVIA</button>
                <a href="juegos.html" class="btn-nav btn-pink">🏠 VOLVER AL PANEL</a>
            </div>
        </div>
    </div>

    <script>
        // Banco de preguntas corregido (Ya no dice la palabra Intruso en las opciones)
        const preguntasTrivia = [
            {
                textoVoz: "¡Alerta en el norte! Estamos revisando los organismos que habitan en el árido Desierto de Atacama, pero un ser vivo se confundió de mapa. ¿Quién es el intruso?",
                opciones: [
                    { clave: "A", texto: "🌵 Cactus de Atacama", esCorrecto: false },
                    { clave: "B", texto: "🦎 Corredor de Atacama", esCorrecto: false },
                    { clave: "C", texto: "🦌 Huemul", esCorrecto: true }
                ]
            },
            {
                textoVoz: "¡Cuidado, héroe! A veces llegan animales de otros países que causan estragos en nuestros ríos del sur. ¿Cuál de estos es un intruso peligroso para el ecosistema chileno?",
                opciones: [
                    { clave: "A", texto: "🦦 Pudú", esCorrecto: false },
                    { clave: "B", texto: "🦫 Castor Americano", esCorrecto: true },
                    { clave: "C", texto: "🦅 Cóndor Andino", esCorrecto: false }
                ]
            },
            {
                textoVoz: "En el bosque valdiviano, los productores atrapan la luz del sol para fabricar energía. Pero alguien se coló en la fila porque él no fabrica su alimento, ¡sino que caza! ¿Quién es el intruso?",
                opciones: [
                    { clave: "A", texto: "🌲 Alerce", esCorrecto: false },
                    { clave: "B", texto: "🌺 Copihue", esCorrecto: false },
                    { clave: "C", texto: "🐆 Puma Chileno", esCorrecto: true }
                ]
            },
            {
                textoVoz: "¡Nos sumergimos en las costas de Chile! Aquí vemos algas y peces nadando felices, pero alguien respira por pulmones y prefiere volar por los cielos andinos. ¿Quién es el intruso marino?",
                opciones: [
                    { clave: "A", texto: "🦉 Lechuza", esCorrecto: true },
                    { clave: "B", texto: "🐧 Pingüino de Humboldt", esCorrecto: false },
                    { clave: "C", texto: "🐟 Jurel", esCorrecto: false }
                ]
            },
            {
                textoVoz: "¡Llegó la noche en la cordillera! Los animales nocturnos salen a buscar comida en la oscuridad, pero hay un intruso que duerme de noche y necesita el sol para activarse. ¿Quién se metió en la noche?",
                opciones: [
                    { clave: "A", texto: "🦉 Tucúquere", esCorrecto: false },
                    { clave: "B", texto: "🦎 Lagartija Esbelta", esCorrecto: true },
                    { clave: "C", texto: "🦇 Murciélago Orejudo", esCorrecto: false }
                ]
            }
        ];

        let indicePregunta = 0;
        let puntaje = 0;
        let spansPalabras = [];
        let bloqueandoOpciones = false;

        document.addEventListener("DOMContentLoaded", () => {
            const avatar = localStorage.getItem("avatarEstudiante") || "avatar1";
            const imgHero = document.getElementById("player-hero-avatar");
            if(avatar === "avatar1") imgHero.src = "img/avatar1.jpeg";
            else if(avatar === "avatar2") imgHero.src = "img/avatar2.jpeg";
            else if(avatar === "avatar3") imgHero.src = "img/avatar3.jpeg";
            else if(avatar === "avatar4") imgHero.src = "img/avatar4.jpeg";
            
            cargarPregunta();
        });

        function cargarPregunta() {
            bloqueandoOpciones = false;
            document.getElementById("current-question").textContent = `${indicePregunta + 1}/5`;
            document.getElementById("score-node").textContent = puntaje;

            const datosPregunta = preguntasTrivia[indicePregunta];
            const cajaIns = document.getElementById("instruction-bubble");
            
            cajaIns.innerHTML = datosPregunta.textoVoz.split(' ').map(w => `<span class="word-span">${w}</span>`).join(' ');
            spansPalabras = cajaIns.querySelectorAll('.word-span');

            const pool = document.getElementById("options-pool");
            pool.innerHTML = datosPregunta.opciones.map(opc => `
                <button class="btn-option" onclick="validarRespuesta(${opc.esCorrecto}, this)">
                    <strong>${opc.clave})</strong> ${opc.texto}
                </button>
            `).join('');

            reproducirConSubrayado(datosPregunta.textoVoz);
        }

        function reproducirConSubrayado(textoAEscuchar) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            const ut = new SpeechSynthesisUtterance(textoAEscuchar);
            ut.lang = 'es-CL';
            ut.rate = 0.85;
            let idxW = 0;

            ut.onboundary = (e) => {
                if (e.name === 'word') {
                    spansPalabras.forEach(s => s.classList.remove('word-highlight'));
                    if (idxW < spansPalabras.length) {
                        spansPalabras[idxW].classList.add('word-highlight');
                        idxW++;
                    }
                }
            };
            ut.onend = () => spansPalabras.forEach(s => s.classList.remove('word-highlight'));
            window.speechSynthesis.speak(ut);
        }

        function volverAEscuchar() { 
            reproducirConSubrayado(preguntasTrivia[indicePregunta].textoVoz); 
        }

        function validarRespuesta(esCorrecto, botonPresionado) {
            if (bloqueandoOpciones) return;
            bloqueandoOpciones = true;

            if (esCorrecto) {
                botonPresionado.style.backgroundColor = "#bbf7d0"; 
                botonPresionado.style.borderColor = "#16a34a";
                puntaje += 100;
                document.getElementById("score-node").textContent = puntaje;
                reproducirAcierto(); // Sonido nativo de acierto
                reproducirAudioCorto("¡Bien Hecho! Atrapaste al intruso.");
            } else {
                botonPresionado.style.backgroundColor = "#fecdd3"; 
                botonPresionado.style.borderColor = "#dc2626";
                puntaje = Math.max(0, puntaje - 20);
                document.getElementById("score-node").textContent = puntaje;
                reproducirError(); // Sonido nativo de error
                reproducirAudioCorto("¡Ese organismo sí pertenece al lugar!");
            }

            setTimeout(() => {
                if (indicePregunta < 4) {
                    indicePregunta++;
                    cargarPregunta();
                } else {
                    finalizarJuego();
                }
            }, 1500);
        }

        function reproducirAudioCorto(mensaje) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const discurso = new SpeechSynthesisUtterance(mensaje);
                discurso.lang = 'es-CL';
                window.speechSynthesis.speak(discurso);
            }
        }

        function finalizarJuego() {
            // Guardar puntaje en localStorage
            localStorage.setItem("puntaje_juego4", puntaje);

            document.getElementById("screen-game").classList.add("screen-hidden");
            document.getElementById("screen-results").classList.remove("screen-hidden");
            document.getElementById("results-score-text").textContent = `CONSEGUISTE ${puntaje} PUNTOS`;
            
            lanzarSerpentinas(); // Serpentinas visuales y sonido de confetti
            reproducirAudioCorto(`¡Misión cumplida! Completaste el rastreo de intrusos y conseguiste ${puntaje} puntos.`);
        }

        function reiniciarJuego() {
            indicePregunta = 0;
            puntaje = 0;
            document.getElementById("screen-results").classList.add("screen-hidden");
            document.getElementById("screen-game").classList.remove("screen-hidden");
            cargarPregunta();
        }
    </script>
</body>
</html>
