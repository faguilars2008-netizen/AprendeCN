<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a la Liga - Ciencias Naturales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%) !important;
            background-color: #0f172a !important; /* Fondo oscuro de respaldo */
            font-family: 'Open Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .welcome-card {
            background: #ffffff !important;
            border: 5px solid #000000 !important;
            border-radius: 24px !important;
            box-shadow: 12px 12px 0px #000000 !important;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .badge-ready {
            background: #e11d48;
            color: #ffffff;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            padding: 6px 16px;
            transform: rotate(-4deg);
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px #000000;
            margin-bottom: 25px;
            letter-spacing: 1px;
            display: inline-block;
        }

        .welcome-title {
            font-family: 'Bangers', cursive;
            font-size: 3.5rem;
            color: #1e3a8a;
            line-height: 1;
            text-shadow: 2px 2px 0px #fde047;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        #player-name { 
            color: #e11d48; 
        }

        .avatar-display-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Forzamos que la imagen use un tamaño controlado sí o sí */
        .welcome-avatar {
            width: 140px !important;
            height: 140px !important;
            max-width: 140px !important;
            max-height: 140px !important;
            object-fit: cover !important;
            border: 5px solid #000000 !important;
            border-radius: 50% !important;
            box-shadow: 5px 5px 0px #000000 !important;
            display: block !important;
        }

        .stars-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comic-star {
            font-size: 2.2rem;
            color: #fde047;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 3px 3px 0px #000000;
        }

        .star-center {
            font-size: 2.8rem;
            transform: translateY(-5px);
        }

        .welcome-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #334155;
            margin-bottom: 25px;
        }

        .btn-comic {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            padding: 12px 35px;
            border: 4px solid #000000;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 5px 5px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-comic:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000000;
        }

        .btn-blue-action {
            background: #2563eb;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000000;
            margin-bottom: 15px;
        }

        .btn-yellow-action {
            background: #fde047;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        
        <span class="badge-ready">¡LISTO PARA LA ACCIÓN!</span>
        
        <h1 class="welcome-title">BIENVENIDO, <span id="player-name">HÉROE</span>!</h1>
        
        <div class="avatar-display-container">
            <img id="chosen-avatar" src="img/avatar1.jpeg" alt="Tu Avatar" class="welcome-avatar">
        </div>

        <div class="stars-group">
            <i class="fa-solid fa-star comic-star"></i>
            <i class="fa-solid fa-star comic-star star-center"></i>
            <i class="fa-solid fa-star comic-star"></i>
        </div>

        <p class="welcome-text">¡Elige tu próximo paso en la liga de la ciencia!</p>

        <button class="btn-comic btn-blue-action" onclick="irAJuegos()">
            ¡COMENZAR JUEGO! 🎮
        </button>
        
        <a href="basico4.html" class="btn-comic btn-yellow-action">4° Básico</a>
        
    </div>

    <script src="js/bienvenida.js"></script>
</body>
</html>
