<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4° Básico - Ciencias Naturales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%) !important;
            background-color: #0f172a !important;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .main-container-comic {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .comic-header {
            text-align: center;
            background: #ffffff !important;
            border: 5px solid #000000 !important;
            border-radius: 20px !important;
            padding: 25px;
            box-shadow: 10px 10px 0px #000000 !important;
            position: relative;
        }

        .badge-level {
            background: #fde047 !important;
            color: #000000 !important;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            padding: 6px 16px;
            border: 3px solid #000000 !important;
            border-radius: 8px;
            position: absolute;
            top: -18px;
            left: 20px;
            transform: rotate(-3deg);
            box-shadow: 4px 4px 0px #000000;
        }

        .main-title {
            font-family: 'Bangers', cursive;
            font-size: 3.5rem;
            color: #1e3a8a !important;
            text-shadow: 2px 2px 0px #fde047;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: bold;
            color: #475569;
        }

        .comic-card-section {
            background: #ffffff !important;
            border: 5px solid #000000 !important;
            border-radius: 18px !important;
            padding: 30px;
            box-shadow: 8px 8px 0px #000000 !important;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .section-title-badge {
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            color: #ffffff !important;
            padding: 6px 18px;
            border: 3px solid #000000 !important;
            border-radius: 8px;
            align-self: flex-start;
            box-shadow: 3px 3px 0px #000000;
            text-shadow: 2px 2px 0px #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-green .section-title-badge { background-color: #16a34a !important; }
        .color-orange .section-title-badge { background-color: #ea580c !important; }
        .color-red .section-title-badge { background-color: #dc2626 !important; }
        .color-purple .section-title-badge { background-color: #9333ea !important; }

        .learning-paragraph, .chilean-examples {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #1e293b;
        }

        .chilean-examples {
            background: #f8fafc !important;
            border-left: 6px solid #1e3a8a !important;
            padding: 15px;
            margin-top: 5px;
            border-radius: 6px;
        }

        /* ====================================================
           ESTILO DEL SUBRAYADO DINÁMICO (EFECTO RESALTADOR)
           ==================================================== */
        .word-span {
            position: relative;
            display: inline-block;
            padding: 0 2px;
            transition: background-color 0.1s ease, color 0.1s ease;
        }

        /* Cuando la palabra esté sonando, se le agregará esta clase */
        .word-highlight {
            background-color: #fde047 !important; /* Amarillo resaltador estilo cómic */
            color: #000000 !important;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 2px 2px 0px #000000;
        }

        .btn-listen-voice {
            align-self: flex-end;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            background: #fde047 !important;
            color: #000000 !important;
            border: 3px solid #000000 !important;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .btn-listen-voice:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .footer-navigation {
            text-align: center;
            margin-top: 10px;
        }

        .btn-back-panel {
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            background: #e11d48 !important;
            color: #ffffff !important;
            border: 4px solid #000000 !important;
            padding: 10px 35px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 6px 6px 0px #000000;
            text-shadow: 2px 2px 0px #000000;
        }
    </style>
</head>
<body>

    <div class="main-container-comic">
        
        <header class="comic-header">
            <span class="badge-level">4° BÁSICO</span>
            <h1 class="main-title">Ciencias Naturales</h1>
            <p class="subtitle">¡Aprende los roles de la cadena alimentaria en los ecosistemas de Chile!</p>
        </header>

        <section class="comic-card-section color-green" id="materia-productores">
            <div class="section-title-badge">🌱 Productores</div>
            <p class="learning-paragraph" data-text="Son los organismos que fabrican su propio alimento. Utilizan la energía del sol, agua y dióxido de carbono para realizar la fotosíntesis. ¡Sin ellos no habría energía en el planeta!"></p>
            <div class="chilean-examples" data-text="Ejemplos en Chile: El árbol de Alerce, las plantas del bosque nativo y las algas del océano pacífico."></div>
            <button class="btn-listen-voice" onclick="escucharConSubrayado('materia-productores')">
                <i class="fa-solid fa-volume-high"></i> ESCUCHAR MATERIA
            </button>
        </section>

        <section class="comic-card-section color-orange" id="materia-consumidores1">
            <div class="section-title-badge">🦌 Consumidores 1° (Herbívoros)</div>
            <p class="learning-paragraph" data-text="Son animales que no pueden producir su propio alimento, por lo que necesitan alimentarse directamente de plantas, frutos o semillas para obtener energía."></p>
            <div class="chilean-examples" data-text="Ejemplos en Chile: El Huemul, el Pudú, los guanacos en el norte y el picaflor de Juan Fernández."></div>
            <button class="btn-listen-voice" onclick="escucharConSubrayado('materia-consumidores1')">
                <i class="fa-solid fa-volume-high"></i> ESCUCHAR MATERIA
            </button>
        </section>

        <section class="comic-card-section color-red" id="materia-consumidores2">
            <div class="section-title-badge">🐾 Consumidores 2° (Carnívoros)</div>
            <p class="learning-paragraph" data-text="Son animales depredadores que obtienen su energía y nutrientes alimentándose de otros animales, generalmente de los herbívoros."></p>
            <div class="chilean-examples" data-text="Ejemplos en Chile: El Puma de la cordillera, el zorro culpeo, el chercán y las aves rapaces como el Peuco."></div>
            <button class="btn-listen-voice" onclick="escucharConSubrayado('materia-consumidores2')">
                <i class="fa-solid fa-volume-high"></i> ESCUCHAR MATERIA
            </button>
        </section>

        <section class="comic-card-section color-purple" id="materia-descomponedores">
            <div class="section-title-badge">🍄 Descomponedores</div>
            <p class="learning-paragraph" data-text="Son los encargados de absorber la energía descomponiendo los restos de organismos muertos. Al hacer esto, reciclan la materia orgánica y devuelven los nutrientes minerales limpios al suelo."></p>
            <div class="chilean-examples" data-text="Ejemplos en Chile: Los hongos del bosque nativo, las bacterias del suelo y los pequeños escarabajos peloteros."></div>
            <button class="btn-listen-voice" onclick="escucharConSubrayado('materia-descomponedores')">
                <i class="fa-solid fa-volume-high"></i> ESCUCHAR MATERIA
            </button>
        </section>

        <footer class="footer-navigation">
            <a href="bienvenida.html" class="btn-back-panel">⬅ VOLVER AL PANEL</a>
        </footer>

    </div>

    <script>
        // Esta función desglosa los textos en palabras independientes al cargar la pantalla
        document.addEventListener("DOMContentLoaded", () => {
            const parrafos = document.querySelectorAll('.learning-paragraph, .chilean-examples');
            
            parrafos.forEach(elemento => {
                const textoOriginal = elemento.getAttribute('data-text');
                const palabras = textoOriginal.split(' ');
                
                // Convertimos cada palabra en un <span> con una ID numerada correlativa
                const htmlPalabras = palabras.map(palabra => {
                    return `<span class="word-span">${palabra}</span>`;
                }).join(' ');
                
                elemento.innerHTML = htmlPalabras;
            });
        });

        let parSpansGlobales = []; // Guarda las referencias de los spans de la sección activa

        function escucharConSubrayado(idSeccion) {
            if (!('speechSynthesis' in window)) {
                alert("Tu sistema no soporta lectura asistida.");
                return;
            }

            window.speechSynthesis.cancel(); // Apaga voces previas
            
            // Limpiar cualquier subrayado viejo que haya quedado pegado
            document.querySelectorAll('.word-span').forEach(el => el.classList.remove('word-highlight'));

            const seccion = document.getElementById(idSeccion);
            const parrafoElemento = seccion.querySelector('.learning-paragraph');
            const ejemplosElemento = seccion.querySelector('.chilean-examples');

            // Capturamos todos los spans de esta sección específica (saltándonos el título)
            const spansParrafo = parrafoElemento.querySelectorAll('.word-span');
            const spansEjemplos = ejemplosElemento.querySelectorAll('.word-span');
            parSpansGlobales = [...spansParrafo, ...spansEjemplos];

            // Reconstruimos el texto puro uniendo las palabras para pasárselo a la voz de Google
            const textoLimpioParrafo = parrafoElemento.getAttribute('data-text');
            const textoLimpioEjemplos = ejemplosElemento.getAttribute('data-text');
            const textoFinalLectura = `${textoLimpioParrafo} ${textoLimpioEjemplos}`;

            const narracion = new SpeechSynthesisUtterance(textoFinalLectura);
            narracion.lang = 'es-CL';
            narracion.rate = 0.85; // Un pelito más lento para coordinar bien el pintado de palabras

            let palabraIndice = 0;

            // Evento mágico de la API SpeechSynthesis: avisa cada vez que la voz empieza una palabra nueva
            narracion.onboundary = (event) => {
                if (event.name === 'word') {
                    // Quitamos el resaltado de la palabra anterior
                    parSpansGlobales.forEach(el => el.classList.remove('word-highlight'));

                    // Pintamos la palabra que está sonando en este instante
                    if (palabraIndice < parSpansGlobales.length) {
                        parSpansGlobales[palabraIndice].classList.add('word-highlight');
                        palabraIndice++;
                    }
                }
            };

            // Al terminar la lectura completa, limpiamos el último resaltado
            narracion.onend = () => {
                parSpansGlobales.forEach(el => el.classList.remove('word-highlight'));
            };

            window.speechSynthesis.speak(narracion);
        }
    </script>
</body>
</html>
