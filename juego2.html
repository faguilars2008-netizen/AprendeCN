<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 2: Atrapa la Energía</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%) !important;
            background-color: #0f172a !important;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-box {
            background: #ffffff !important;
            border: 5px solid #000000 !important;
            border-radius: 24px !important;
            box-shadow: 12px 12px 0px #000000 !important;
            max-width: 550px;
            width: 100%;
            padding: 25px;
            text-align: center;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #f8fafc;
            border: 3px solid #000000;
            padding: 8px 15px;
            border-radius: 12px;
        }
        .hud-text {
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #1e3a8a;
        }
        .score-badge { color: #e11d48; }
        .character-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .avatar-frame {
            width: 85px;
            height: 85px;
            border: 4px solid #000000;
            border-radius: 50%;
            box-shadow: 4px 4px 0px #000000;
            object-fit: cover;
        }
        .btn-repeat-voice {
            background: #fde047 !important;
            color: #000000 !important;
            border: 3px solid #000000;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .comic-bubble {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 6px 6px 0px #1e3a8a;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.5;
        }
        .word-span { display: inline-block; padding: 0 2px; transition: background-color 0.1s; }
        .word-highlight { background-color: #fde047 !important; color: #000000 !important; border-radius: 4px; }
        
        /* Contenedor de burbujas/tarjetas */
        .grid-targets {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-target {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            padding: 15px;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s;
            text-transform: uppercase;
        }
        .btn-target:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000000; }
        
        .screen-hidden { display: none !important; }
        .victory-title { font-family: 'Bangers', cursive; font-size: 3.5rem; color: #16a34a; text-shadow: 3px 3px 0px #000000; margin-bottom: 15px; }
        .final-badge { font-family: 'Bangers', cursive; font-size: 1.8rem; background: #fde047; padding: 8px 20px; border: 4px solid #000000; display: inline-block; box-shadow: 4px 4px 0px #000000; margin-bottom: 30px; }
        
        .btn-nav { font-family: 'Bangers', cursive; font-size: 1.5rem; padding: 12px 25px; border: 4px solid #000000; border-radius: 12px; cursor: pointer; text-decoration: none; display: inline-block; box-shadow: 5px 5px 0px #000000; text-shadow: 2px 2px 0px #000000; width: 85%; }
        .btn-blue { background: #2563eb; color: #ffffff; }
        .btn-yellow { background: #fde047; color: #000000; text-shadow: none; }
        .btn-red { background: #e11d48; color: #ffffff; }

        .correct-blink { background-color: #bbf7d0 !important; border-color: #16a34a !important; }
        .wrong-blink { background-color: #fecdd3 !important; border-color: #dc2626 !important; }
    </style>
</head>
<body>

    <div class="game-box">
        <div id="screen-game">
            <header class="game-header">
                <div class="hud-text">MISIÓN: <span id="current-stage">1</span>/3</div>
                <div class="hud-text">PUNTOS: <span id="score-node" class="score-badge">0</span></div>
            </header>

            <div class="character-zone">
                <img id="player-hero-avatar" src="img/avatar1.jpeg" alt="Héroe" class="avatar-frame">
                <button class="btn-repeat-voice" onclick="volverAEscuchar()"><i class="fa-solid fa-volume-high"></i></button>
            </div>

            <div class="comic-bubble" id="instruction-bubble"></div>

            <div class="grid-targets" id="targets-container"></div>
        </div>

        <div id="screen-results" class="screen-hidden">
            <h1 class="victory-title">¡JUEGO COMPLETADO!</h1>
            <p class="final-badge" id="results-score-text">CONSEGUISTE 0 PUNTOS</p>
            <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                <a href="juego3.html" class="btn-nav btn-blue">➡️ SIGUIENTE NIVEL (JUEGO 3)</a>
                <button class="btn-nav btn-yellow" onclick="reiniciarJuego()">🔄 REPETIR JUEGO 2</button>
                <a href="bienvenida.html" class="btn-nav btn-red">🏠 VOLVER AL INICIO</a>
            </div>
        </div>
    </div>

    <script>
        const etapasJuego = [
            { objetivo: "Productores", instruccion: "¡Alerta! Necesitamos capturar energía pura. Haz clic solo en los organismos PRODUCTORES de Chile.", opciones: ["Alerce", "Huemul", "Puma", "Hongo"], correcto: 0 },
            { objetivo: "Consumidores Primarios", instruccion: "¡Rápido! El ecosistema busca equilibrio. Atrapa al CONSUMIDOR PRIMARIO (herbívoro).", opciones: ["Zorro Culpeo", "Pudú", "Árbol Araucaria", "Bacterias"], correcto: 1 },
            { objetivo: "Descomponedores", instruccion: "¡Última misión! Encuentra al encargado de limpiar los suelos de nuestros bosques: el DESCOMPONEDOR.", opciones: ["Cóndor", "Pasto", "Guanaco", "Hongos Silvestres"], correcto: 3 }
        ];

        let etapaActual = 0;
        let puntaje = 0;
        let bloqueado = false;
        let spansPalabras = [];

        document.addEventListener("DOMContentLoaded", () => {
            const avatar = localStorage.getItem("avatarEstudiante") || "avatar1";
            document.getElementById("player-hero-avatar").src = `img/${avatar}.jpeg`;
            cargarEtapa();
        });

        function cargarEtapa() {
            bloqueado = false;
            document.getElementById("current-stage").textContent = etapaActual + 1;
            document.getElementById("score-node").textContent = puntaje;

            const datos = etapasJuego[etapaActual];
            const cajaIns = document.getElementById("instruction-bubble");
            
            cajaIns.innerHTML = datos.instruccion.split(' ').map(w => `<span class="word-span">${w}</span>`).join(' ');
            spansPalabras = cajaIns.querySelectorAll('.word-span');

            const contenedor = document.getElementById("targets-container");
            contenedor.innerHTML = datos.opciones.map((opc, idx) => `
                <button class="btn-target" onclick="verificarClick(${idx})">${opc}</button>
            `).join('');

            reproducirConSubrayado(datos.instruccion);
        }

        function reproducirConSubrayado(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            spansPalabras.forEach(s => s.classList.remove('word-highlight'));

            const ut = new SpeechSynthesisUtterance(texto);
            ut.lang = 'es-CL';
            ut.rate = 0.85;
            let idxWord = 0;

            ut.onboundary = (e) => {
                if (e.name === 'word') {
                    spansPalabras.forEach(s => s.classList.remove('word-highlight'));
                    if (idxWord < spansPalabras.length) {
                        spansPalabras[idxWord].classList.add('word-highlight');
                        idxWord++;
                    }
                }
            };
            ut.onend = () => spansPalabras.forEach(s => s.classList.remove('word-highlight'));
            window.speechSynthesis.speak(ut);
        }

        function volverAEscuchar() {
            reproducirConSubrayado(etapasJuego[etapaActual].instruccion);
        }

        function verificarClick(idxSeleccionado) {
            if (bloqueado) return;
            bloqueado = true;
            window.speechSynthesis.cancel();

            const datos = etapasJuego[etapaActual];
            const botones = document.querySelectorAll(".btn-target");

            if (idxSeleccionado === datos.correcto) {
                botones[idxSeleccionado].classList.add("correct-blink");
                puntaje += 150;
                document.getElementById("score-node").textContent = puntaje;
                speakFeedback("¡Eso es! Captura exitosa.");
            } else {
                botones[idxSeleccionado].classList.add("wrong-blink");
                botones[datos.correcto].classList.add("correct-blink");
                speakFeedback("¡Oh, energía incorrecta!");
            }

            setTimeout(() => {
                etapaActual++;
                if (etapaActual < etapasJuego.length) {
                    cargarEtapa();
                } else {
                    finalizarJuego();
                }
            }, 2300);
        }

        function speakFeedback(msg) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(msg);
                u.lang = 'es-CL';
                window.speechSynthesis.speak(u);
            }
        }

        function finalizarJuego() {
            document.getElementById("screen-game").classList.add("screen-hidden");
            document.getElementById("screen-results").classList.remove("screen-hidden");
            document.getElementById("results-score-text").textContent = `CONSEGUISTE ${puntaje} PUNTOS`;
            speakFeedback(`¡Espectacular! Terminaste el nivel 2 con ${puntaje} puntos.`);
        }

        function reiniciarJuego() {
            etapaActual = 0;
            puntaje = 0;
            document.getElementById("screen-results").classList.add("screen-hidden");
            document.getElementById("screen-game").classList.remove("screen-hidden");
            cargarEtapa();
        }
    </script>
</body>
</html>
